<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0A0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="영수증 스캐너" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>영수증 스캐너</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0F;
      --surface: #13131A;
      --surface2: #1C1C27;
      --border: rgba(255,255,255,0.08);
      --accent: #7CFF9B;
      --accent2: #5B8BFF;
      --accent3: #FF6B9D;
      --text: #F0F0F8;
      --text-muted: rgba(240,240,248,0.45);
      --radius: 20px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      padding-top: var(--safe-top);
      padding-bottom: calc(var(--safe-bottom) + 80px);
    }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .main { padding: 20px; }
    .upload-zone {
      border: 2px dashed rgba(124,255,155,0.3);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(124,255,155,0.04), rgba(91,139,255,0.04));
      padding: 40px 20px; text-align: center; cursor: pointer;
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .upload-zone::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(124,255,155,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .upload-zone.dragging { border-color: var(--accent); background: rgba(124,255,155,0.08); transform: scale(0.99); }
    .upload-icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .upload-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .upload-sub { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .upload-btn {
      margin-top: 20px;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #000;
      font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 14px;
      padding: 12px 24px; border-radius: 100px; border: none; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 24px rgba(124,255,155,0.3);
    }
    .upload-btn:active { transform: scale(0.96); }
    .camera-btn {
      margin-top: 12px; margin-left: 8px;
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--accent2);
      font-family: 'Noto Sans KR', sans-serif; font-weight: 500; font-size: 13px;
      padding: 10px 20px; border-radius: 100px;
      border: 1px solid rgba(91,139,255,0.3); cursor: pointer; transition: all 0.15s;
    }
    .camera-btn:active { background: rgba(91,139,255,0.1); }
    #fileInput, #cameraInput { display: none; }
    .preview-wrap {
      position: relative; border-radius: var(--radius);
      overflow: hidden; background: var(--surface); margin-bottom: 16px;
    }
    .preview-img { width: 100%; max-height: 280px; object-fit: contain; display: block; }
    .preview-badge {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      border-radius: 20px; padding: 4px 12px;
      font-size: 11px; color: var(--accent); font-weight: 700;
    }
    .remove-btn {
      position: absolute; top: 12px; left: 12px;
      width: 32px; height: 32px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      border: none; border-radius: 50%; color: white; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .analyze-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent), #4CFFA0);
      border: none; border-radius: var(--radius);
      font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; color: #000;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s; box-shadow: 0 8px 32px rgba(124,255,155,0.25); margin-bottom: 24px;
    }
    .analyze-btn:active { transform: scale(0.98); }
    .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    .loading-wrap {
      display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px;
    }
    .loading-wrap.show { display: flex; }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(124,255,155,0.15); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }
    .loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
    @keyframes dots { 0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'} }
    .result-section { display: none; animation: slideUp 0.4s ease; }
    .result-section.show { display: block; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .result-title { font-size: 16px; font-weight: 700; }
    .result-count { font-size: 12px; color: var(--text-muted); background: var(--surface2); padding: 4px 10px; border-radius: 20px; }
    .store-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
      display: flex; gap: 12px; align-items: center;
    }
    .store-icon { font-size: 28px; }
    .store-name { font-size: 16px; font-weight: 700; }
    .store-date { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .items-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .item-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.15s; animation: fadeIn 0.3s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
    .item-emoji {
      width: 40px; height: 40px; background: var(--surface2);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .item-price { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .category-tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; margin-right: 4px; font-weight: 500; }
    .cat-food { background: rgba(255,107,157,0.15); color: var(--accent3); }
    .cat-drink { background: rgba(91,139,255,0.15); color: var(--accent2); }
    .cat-snack { background: rgba(255,200,80,0.15); color: #FFC850; }
    .cat-other { background: rgba(240,240,248,0.1); color: var(--text-muted); }
    .summary-card {
      background: linear-gradient(135deg, rgba(124,255,155,0.08), rgba(91,139,255,0.08));
      border: 1px solid rgba(124,255,155,0.2); border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
    }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
    .summary-row.total { border-top: 1px solid rgba(255,255,255,0.1); margin-top: 8px; padding-top: 14px; font-size: 18px; font-weight: 700; }
    .summary-row.total .val { font-family: 'Space Mono', monospace; color: var(--accent); }
    .summary-label { color: var(--text-muted); font-size: 13px; }
    .summary-val { font-family: 'Space Mono', monospace; font-size: 13px; }
    .action-row { display: flex; gap: 10px; margin-bottom: 8px; }
    .action-btn {
      flex: 1; padding: 13px; border-radius: 14px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s;
    }
    .action-btn:active { background: var(--surface2); transform: scale(0.97); }
    .action-btn.primary { background: var(--surface2); border-color: rgba(124,255,155,0.2); color: var(--accent); }
    .section-label { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; }
    .history-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
    }
    .history-card:active { background: var(--surface2); }
    .history-icon { font-size: 24px; }
    .history-info { flex: 1; }
    .history-store { font-size: 14px; font-weight: 500; }
    .history-date { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .history-total { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: var(--accent); }
    .error-box {
      background: rgba(255,107,157,0.1); border: 1px solid rgba(255,107,157,0.3);
      border-radius: 16px; padding: 16px; font-size: 14px; color: var(--accent3);
      display: none; margin-bottom: 16px;
    }
    .error-box.show { display: block; }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,15,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + var(--safe-bottom)); display: flex;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px;
      cursor: pointer; transition: all 0.15s; border: none; background: none; color: var(--text-muted);
      font-family: 'Noto Sans KR', sans-serif; font-size: 10px; font-weight: 500;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0; transition: opacity 0.2s; margin-top: -2px; }
    .nav-item.active .nav-dot { opacity: 1; }
    .page { display: none; }
    .page.active { display: block; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
    .stat-icon { font-size: 24px; margin-bottom: 8px; }
    .stat-val { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .stat-label { font-size: 11px; color: var(--text-muted); }
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 20px; font-size: 13px; font-weight: 500;
      white-space: nowrap; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .install-banner {
      background: linear-gradient(135deg, rgba(91,139,255,0.15), rgba(124,255,155,0.1));
      border: 1px solid rgba(91,139,255,0.25); border-radius: var(--radius);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .install-banner-text { flex: 1; font-size: 13px; line-height: 1.4; }
    .install-banner-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
    .install-banner-text span { color: var(--text-muted); font-size: 12px; }
    .install-btn {
      background: var(--accent2); color: white;
      font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 12px;
      padding: 8px 14px; border-radius: 20px; border: none; cursor: pointer; white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="header">
  <div class="header-icon">🧾</div>
  <div>
    <div class="header-title">영수증 스캐너</div>
    <div class="header-sub">AI 자동 항목 분석</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="page active" id="page-scan">
  <div class="main">
    <div class="install-banner" id="installBanner" style="display:none">
      <span style="font-size:28px">📲</span>
      <div class="install-banner-text">
        <strong>홈 화면에 추가하기</strong>
        <span>앱처럼 바로 사용하세요</span>
      </div>
      <button class="install-btn" id="installBtn">추가</button>
    </div>
    <div class="upload-zone" id="uploadZone">
      <span class="upload-icon">🧾</span>
      <div class="upload-title">영수증 사진을 업로드하세요</div>
      <div class="upload-sub">AI가 자동으로 모든 항목을<br>분석하고 정리해드립니다</div>
      <div style="margin-top:20px">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📁 갤러리에서 선택</button>
        <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">📷 카메라 촬영</button>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" />
    <input type="file" id="cameraInput" accept="image/*" capture="environment" />
    <div id="previewSection" style="display:none; margin-top:16px">
      <div class="preview-wrap">
        <img class="preview-img" id="previewImg" src="" alt="영수증 미리보기" />
        <div class="preview-badge">✓ 업로드 완료</div>
        <button class="remove-btn" onclick="removeImage()">✕</button>
      </div>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeReceipt()">✨ AI로 분석하기</button>
    </div>
    <div class="error-box" id="errorBox"></div>
    <div class="loading-wrap" id="loadingWrap">
      <div class="spinner"></div>
      <div class="loading-text">AI가 영수증을 분석하는 중<span class="loading-dots"></span></div>
    </div>
    <div class="result-section" id="resultSection">
      <div class="store-card" id="storeCard"></div>
      <div class="result-header">
        <div class="result-title">📋 항목 목록</div>
        <div class="result-count" id="itemCount"></div>
      </div>
      <div class="items-list" id="itemsList"></div>
      <div class="summary-card" id="summaryCard"></div>
      <div class="action-row">
        <button class="action-btn primary" onclick="saveReceipt()">💾 저장</button>
        <button class="action-btn" onclick="copyText()">📋 복사</button>
        <button class="action-btn" onclick="resetScan()">🔄 새로 스캔</button>
      </div>
    </div>
  </div>
</div>
<div class="page" id="page-history">
  <div class="main">
    <div class="section-label">저장된 영수증</div>
    <div id="historyList">
      <div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px">
        <div style="font-size:48px;margin-bottom:16px">🗂️</div>
        아직 저장된 영수증이 없어요<br>첫 영수증을 스캔해보세요!
      </div>
    </div>
  </div>
</div>
<div class="page" id="page-stats">
  <div class="main">
    <div class="section-label">지출 통계</div>
    <div id="statsContent">
      <div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px">
        <div style="font-size:48px;margin-bottom:16px">📊</div>
        아직 통계를 낼 데이터가 없어요<br>영수증을 저장하면 분석해드려요!
      </div>
    </div>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchPage('scan', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
    스캔<div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="switchPage('history', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    내역<div class="nav-dot"></div>
  </button>
  <button class="nav-item" onclick="switchPage('stats', this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    통계<div class="nav-dot"></div>
  </button>
</nav>
<script>
let currentImageBase64=null,currentResult=null,deferredPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBanner').style.display='flex';});
document.getElementById('installBtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted'){document.getElementById('installBanner').style.display='none';showToast('홈 화면에 추가되었어요! 🎉');}deferredPrompt=null;});
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
const isStandalone=window.matchMedia('(display-mode: standalone)').matches;
if(isIOS&&!isStandalone){const banner=document.getElementById('installBanner');banner.style.display='flex';banner.querySelector('.install-banner-text strong').textContent='iOS에서 앱으로 사용하기';banner.querySelector('.install-banner-text span').textContent='사파리 → 공유 → 홈 화면에 추가';banner.querySelector('.install-btn').style.display='none';}
function switchPage(name,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');btn.classList.add('active');if(name==='history')renderHistory();if(name==='stats')renderStats();}
['fileInput','cameraInput'].forEach(id=>{document.getElementById(id).addEventListener('change',function(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{const dataUrl=ev.target.result;currentImageBase64=dataUrl.split(',')[1];document.getElementById('previewImg').src=dataUrl;document.getElementById('previewSection').style.display='block';document.getElementById('uploadZone').style.display='none';document.getElementById('resultSection').classList.remove('show');document.getElementById('errorBox').classList.remove('show');this.value='';};reader.readAsDataURL(file);});});
const zone=document.getElementById('uploadZone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragging');});
zone.addEventListener('dragleave',()=>zone.classList.remove('dragging'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragging');const file=e.dataTransfer.files[0];if(file&&file.type.startsWith('image/')){const reader=new FileReader();reader.onload=ev=>{currentImageBase64=ev.target.result.split(',')[1];document.getElementById('previewImg').src=ev.target.result;document.getElementById('previewSection').style.display='block';document.getElementById('uploadZone').style.display='none';};reader.readAsDataURL(file);}});
function removeImage(){currentImageBase64=null;document.getElementById('previewSection').style.display='none';document.getElementById('uploadZone').style.display='block';document.getElementById('resultSection').classList.remove('show');}
function resetScan(){removeImage();currentResult=null;}
async function analyzeReceipt(){
  if(!currentImageBase64)return;
  const btn=document.getElementById('analyzeBtn');
  btn.disabled=true;
  document.getElementById('loadingWrap').classList.add('show');
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('errorBox').classList.remove('show');
  const systemPrompt=`당신은 영수증 OCR 및 분석 전문가입니다. 영수증 이미지를 분석하여 반드시 다음 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.\n\n{"store":"가게 이름 (없으면 알 수 없음)","date":"날짜 (YYYY-MM-DD 형식, 없으면 오늘 날짜)","items":[{"name":"상품명","quantity":1,"unitPrice":1000,"totalPrice":1000,"category":"food|drink|snack|other"}],"subtotal":0,"discount":0,"tax":0,"total":0,"paymentMethod":"결제 수단"}\n\ncategory는 반드시 food, drink, snack, other 중 하나여야 합니다.`;
  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:systemPrompt,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:currentImageBase64}},{type:"text",text:"이 영수증을 분석해서 JSON 형식으로 반환해주세요."}]}]})});
    const data=await response.json();
    const raw=data.content?.map(i=>i.text||'').join('')||'';
    const clean=raw.replace(/```json|```/g,'').trim();
    const result=JSON.parse(clean);
    currentResult=result;
    renderResult(result);
  }catch(err){
    const errBox=document.getElementById('errorBox');
    errBox.textContent='⚠️ 분석 중 오류가 발생했어요. 영수증 이미지가 선명한지 확인하고 다시 시도해주세요.';
    errBox.classList.add('show');
  }finally{
    document.getElementById('loadingWrap').classList.remove('show');
    btn.disabled=false;
  }
}
const catMap={food:['🍱','cat-food'],drink:['🥤','cat-drink'],snack:['🍫','cat-snack'],other:['📦','cat-other']};
const catLabel={food:'식품',drink:'음료',snack:'간식',other:'기타'};
function fmt(n){return Number(n||0).toLocaleString('ko-KR')+'원';}
function renderResult(r){
  document.getElementById('storeCard').innerHTML=`<span class="store-icon">🏪</span><div><div class="store-name">${r.store||'알 수 없음'}</div><div class="store-date">${r.date||''} · ${r.paymentMethod||''}</div></div>`;
  document.getElementById('itemCount').textContent=`${r.items?.length||0}개 항목`;
  const list=document.getElementById('itemsList');
  list.innerHTML='';
  (r.items||[]).forEach((item,i)=>{
    const[emoji,catClass]=catMap[item.category]||catMap.other;
    const card=document.createElement('div');
    card.className='item-card';
    card.style.animationDelay=(i*0.05)+'s';
    card.innerHTML=`<div class="item-emoji">${emoji}</div><div class="item-info"><div class="item-name">${item.name}</div><div class="item-meta"><span class="category-tag ${catClass}">${catLabel[item.category]||'기타'}</span>${item.quantity>1?`수량 ${item.quantity}개`:''}</div></div><div class="item-price">${fmt(item.totalPrice)}</div>`;
    list.appendChild(card);
  });
  document.getElementById('summaryCard').innerHTML=`${r.subtotal?`<div class="summary-row"><span class="summary-label">소계</span><span class="summary-val">${fmt(r.subtotal)}</span></div>`:''} ${r.discount?`<div class="summary-row"><span class="summary-label">할인</span><span class="summary-val" style="color:var(--accent3)">-${fmt(r.discount)}</span></div>`:''} ${r.tax?`<div class="summary-row"><span class="summary-label">세금</span><span class="summary-val">${fmt(r.tax)}</span></div>`:''}<div class="summary-row total"><span>최종 합계</span><span class="val">${fmt(r.total)}</span></div>`;
  document.getElementById('resultSection').classList.add('show');
  document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'});
}
function saveReceipt(){if(!currentResult)return;const history=JSON.parse(localStorage.getItem('receipts')||'[]');history.unshift({...currentResult,savedAt:new Date().toISOString(),id:Date.now()});localStorage.setItem('receipts',JSON.stringify(history.slice(0,100)));showToast('✅ 저장되었어요!');}
function copyText(){if(!currentResult)return;const r=currentResult;let text=`[${r.store}] ${r.date}\n${'─'.repeat(25)}\n`;(r.items||[]).forEach(item=>{text+=`${item.name}`.padEnd(15)+`${fmt(item.totalPrice)}\n`;});text+='─'.repeat(25)+'\n합계: '+fmt(r.total);navigator.clipboard.writeText(text).then(()=>showToast('📋 클립보드에 복사됐어요!'));}
function renderHistory(){const history=JSON.parse(localStorage.getItem('receipts')||'[]');const el=document.getElementById('historyList');if(!history.length){el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px"><div style="font-size:48px;margin-bottom:16px">🗂️</div>아직 저장된 영수증이 없어요<br>첫 영수증을 스캔해보세요!</div>';return;}el.innerHTML=history.map(r=>`<div class="history-card" onclick="showHistoryDetail(${r.id})"><span class="history-icon">🧾</span><div class="history-info"><div class="history-store">${r.store||'알 수 없음'}</div><div class="history-date">${r.date||''} · ${r.items?.length||0}개 항목</div></div><div class="history-total">${fmt(r.total)}</div></div>`).join('');}
function showHistoryDetail(id){const history=JSON.parse(localStorage.getItem('receipts')||'[]');const r=history.find(h=>h.id===id);if(!r)return;currentResult=r;document.querySelectorAll('.nav-item')[0].click();document.getElementById('uploadZone').style.display='none';document.getElementById('previewSection').style.display='none';document.getElementById('resultSection').classList.add('show');renderResult(r);setTimeout(()=>document.getElementById('resultSection').scrollIntoView({behavior:'smooth'}),100);}
function renderStats(){
  const history=JSON.parse(localStorage.getItem('receipts')||'[]');
  const el=document.getElementById('statsContent');
  if(!history.length){el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px"><div style="font-size:48px;margin-bottom:16px">📊</div>아직 통계를 낼 데이터가 없어요<br>영수증을 저장하면 분석해드려요!</div>';return;}
  const totalSpent=history.reduce((s,r)=>s+(r.total||0),0);
  const avgSpent=Math.round(totalSpent/history.length);
  const allItems=history.flatMap(r=>r.items||[]);
  const catTotals={};
  allItems.forEach(item=>{catTotals[item.category]=(catTotals[item.category]||0)+(item.totalPrice||0);});
  const topCat=Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
  const catEmoji={food:'🍱',drink:'🥤',snack:'🍫',other:'📦'};
  const catLabelLocal={food:'식품',drink:'음료',snack:'간식',other:'기타'};
  el.innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val" style="color:var(--accent);font-size:16px">${fmt(totalSpent)}</div><div class="stat-label">총 지출</div></div><div class="stat-card"><div class="stat-icon">🧾</div><div class="stat-val" style="color:var(--accent2)">${history.length}</div><div class="stat-label">영수증 수</div></div><div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val" style="font-size:16px">${fmt(avgSpent)}</div><div class="stat-label">평균 지출</div></div><div class="stat-card"><div class="stat-icon">${topCat?catEmoji[topCat[0]]:'❓'}</div><div class="stat-val" style="font-size:16px;color:var(--accent3)">${topCat?catLabelLocal[topCat[0]]:'-'}</div><div class="stat-label">최다 지출 카테고리</div></div></div><div class="section-label">카테고리별 지출</div>${Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{const pct=Math.round(amt/totalSpent*100);return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>${catEmoji[cat]} ${catLabelLocal[cat]}</span><span style="font-family:'Space Mono',monospace;color:var(--accent)">${fmt(amt)} <span style="color:var(--text-muted)">(${pct}%)</span></span></div><div style="height:6px;background:var(--surface);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px"></div></div></div>`;}).join('')}`;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
